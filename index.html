<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>VIP Card</title>

<style>
body{
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#111;
    border:3px solid red;
    padding:40px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 0 20px red;
    width:300px;
}

.vip{
    font-size:40px;
    color:red;
    margin-bottom:20px;
}

.name{
    margin:10px 0;
}

.name a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.name a:hover{
    color:red;
}

.track{
    margin:10px 0;
}

.buy{
    margin-top:20px;
    background:red;
    border:none;
    color:white;
    padding:12px 25px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

.buy:hover{
    background:#cc0000;
}

.master{
    margin-top:20px;
    color:#aaa;
}
</style>

</head>

<body>

<div class="card">

<div class="vip">VIP</div>

<div class="name">
Name: 
<a href="https://www.facebook.com/horrordeath2" target="_blank">
محمود خالد
</a>
</div>

<div class="track">
رقم المسار: خاص ☆
</div>

<button class="buy" onclick="buy()">شراء</button>

<div class="master">
تواصل مع صاحب المنتج Master X
</div>

</div>

<script>

function buy(){
alert("تم تحديد الموقع سيصلك المندوب غدا الحوتة بتوقيت 12 PM");
}

</script>

</body>
</html>
